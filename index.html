<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <header>
    <h1>💰 Financeiro</h1>
    <button type="button" onclick="openModal()">+ Lançamento</button>
  </header>

  <section id="dashboard">
    <div class="card">Saldo: <span id="saldo">R$ 0,00</span></div>
    <div class="card">Receitas: <span id="receitas">R$ 0,00</span></div>
    <div class="card">Despesas: <span id="despesas">R$ 0,00</span></div>
  </section>

  <section>
    <h2>📅 Próximos vencimentos</h2>
    <ul id="vencimentos">
      <li>Nenhum vencimento carregado.</li>
    </ul>
  </section>

  <section>
    <h2>📋 Lançamentos recentes</h2>
    <ul id="lancamentos">
      <li>Carregando...</li>
    </ul>
  </section>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2>Novo lançamento</h2>

      <input id="desc" type="text" placeholder="Descrição" maxlength="120">
      <input id="valor" type="number" step="0.01" min="0" placeholder="Valor">

      <select id="tipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
      </select>

      <div class="modal-actions">
        <button type="button" onclick="salvar()">Salvar</button>
        <button type="button" class="secondary" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
